<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meyyy's Safe Space 🎀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fff9f5; touch-action: manipulation; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Optimalisasi tombol untuk HP */
        .mood-btn { 
            transition: transform 0.2s active;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }
        .mood-btn:active { transform: scale(0.95); }
        
        #chat-section { display: none; }
        #chat-container { scroll-behavior: smooth; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="main-card" class="bg-white w-full max-w-md rounded-[35px] shadow-2xl border-b-8 border-orange-100 overflow-hidden flex flex-col h-[85vh]">
        
        <div class="p-6 bg-orange-50 border-b border-orange-100 flex items-center gap-4 shrink-0">
            <div class="text-3xl">🧸</div>
            <div>
                <h1 class="font-bold text-orange-800 text-lg leading-none">Rickyriqq bot</h1>
                <p class="text-[10px] text-orange-400 font-semibold uppercase tracking-widest mt-1">Always Here for You</p>
            </div>
        </div>

        <div id="mood-section" class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in">
            <h2 class="text-xl font-bold text-gray-700 mb-2">Haiiii Meyyy... ✨</h2>
            <p class="text-gray-500 mb-8 text-sm leading-relaxed">Halooooo aku ciptaan Ahmad untuk jadi temen baru kamu. Aku Ricky Bot, gimana perasaanmu hari ini? Isi dengan jujur yaaa... <br> Pilih satu:</p>
            
            <div class="grid grid-cols-2 gap-4 w-full">
                <button type="button" onclick="selectMood('senang', '🌟 Senang')" class="mood-btn p-4 bg-yellow-50 rounded-2xl border-2 border-yellow-100 flex flex-col items-center">
                    <span class="text-3xl mb-1">😊</span>
                    <span class="text-xs font-bold text-yellow-600">Senang</span>
                </button>
                <button type="button" onclick="selectMood('sedih', '☁️ Sedih')" class="mood-btn p-4 bg-blue-50 rounded-2xl border-2 border-blue-100 flex flex-col items-center">
                    <span class="text-3xl mb-1">🥺</span>
                    <span class="text-xs font-bold text-blue-600">Sedih</span>
                </button>
                <button type="button" onclick="selectMood('galau', '🥀 Galau')" class="mood-btn p-4 bg-purple-50 rounded-2xl border-2 border-purple-100 flex flex-col items-center">
                    <span class="text-3xl mb-1">🥀</span>
                    <span class="text-xs font-bold text-purple-600">Galau</span>
                </button>
                <button type="button" onclick="selectMood('bingung', '🌀 Bingung')" class="mood-btn p-4 bg-orange-50 rounded-2xl border-2 border-orange-100 flex flex-col items-center">
                    <span class="text-3xl mb-1">🤔</span>
                    <span class="text-xs font-bold text-orange-600">Bingung</span>
                </button>
            </div>
        </div>

        <div id="chat-section" class="flex-1 flex flex-col overflow-hidden">
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-orange-50/30"></div>

            <div class="p-4 bg-white border-t border-orange-50 shrink-0">
                <div class="flex gap-2">
                    <input type="text" id="userInput" placeholder="Ceritain semuanya ke Ahmad..." 
                        class="flex-1 bg-orange-50 rounded-full px-4 py-2 outline-none text-sm text-gray-700 border border-transparent focus:border-orange-200">
                    <button type="button" onclick="handleSend()" class="bg-orange-400 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-all">
                        🚀
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const moodSection = document.getElementById('mood-section');
        const chatSection = document.getElementById('chat-section');
        const container = document.getElementById('chat-container');
        const inputField = document.getElementById('userInput');

        let currentMood = ""; 
        let fullStory = "";

        const responses = {
            'senang': "Wahhh, ada apa nihhhh? Aku happy banget liat kamu senang meyy! 😍 Ceritain dong hal seru apa yang bikin kamu senyum hari ini?",
            'sedih': "Sini-sini deketan... 🥺 Sabar ya meyyy, istirahat dulu perasaannya. Ricky siap dengerin kok kalau mau tumpahin semuanya di sini.",
            'galau': "Lagi fase mendung ya? 🥀 Enggak apa-apa, Meyyy gak sendirian. Lapor ke Ahmad sekarang juga, kamu lagi kenapa meyy?",
            'bingung': "Pikiran lagi penuh ya? 🌀 Coba pelan-pelan ketik di sini apa yang bikin bingung, biar lega dikit. Aku dengerin kok..."
        };

        function selectMood(key, label) {
            currentMood = label; 
            moodSection.style.display = 'none';
            chatSection.style.display = 'flex';
            
            // Render bubble mood
            addBubble(`Meyyy lagi merasa: ${label}`, "bg-white text-gray-400 text-[10px] self-center uppercase tracking-widest italic shadow-none");
            
            // Respon bot
            setTimeout(() => { 
                addBubble(responses[key], "bg-orange-100 text-orange-800 border border-orange-200 shadow-sm"); 
            }, 400);
        }

        function addBubble(text, classes) {
            const div = document.createElement('div');
            div.className = `p-3 rounded-2xl max-w-[85%] text-sm leading-relaxed ${classes} fade-in`;
            div.innerText = text;
            container.appendChild(div);
            // Scroll otomatis yang lebih paksa untuk mobile
            setTimeout(() => {
                container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        function sendToWhatsApp() {
            const nomorWA = "6285233017655";
            const pesan = encodeURIComponent(`Halo Ahmad! Meyyy baru aja cerita di Rickyriqq Bot...\n\nMood Meyyy: ${currentMood}\nCerita: ${fullStory}`);
            window.open(`https://wa.me/${nomorWA}?text=${pesan}`, '_blank');
        }

        function downloadImage() {
            const area = document.getElementById('main-card');
            // Menghilangkan sementara animasi agar capture bersih
            html2canvas(area, { scale: 2, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Meyyy-Story-${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }

        async function handleSend() {
            const text = inputField.value.trim();
            if (!text) return;
            fullStory = text;
            addBubble(text, "bg-white text-gray-700 self-end ml-auto border border-orange-100 shadow-sm");
            inputField.value = '';

            const loading = document.createElement('div');
            loading.innerText = "... Ricky sedang mengetik";
            loading.className = "text-orange-300 text-[10px] ml-2 animate-pulse";
            container.appendChild(loading);
            container.scrollTop = container.scrollHeight;

            await new Promise(r => setTimeout(r, 1500));
            loading.remove();

            let finalResponse = "";
            if (currentMood.includes('Senang')) finalResponse = "Makasih ya udah mau berbagi kebahagiaan kamu! Pokoknya meyy harus senyum terus ya hari ini. Ahmad pasti seneng banget denger ini! ✨";
            else if (currentMood.includes('Sedih')) finalResponse = "Makasih ya udah kuat buat cerita. Peluk jauh buat Meyyy! 🫂 Jangan dipendam sendiri ya, Ahmad & Ricky selalu ada di sini.";
            else if (currentMood.includes('Galau')) finalResponse = "Enggak apa-apa buat ngerasa galau, itu manusiawi. Kamu hebat udah jujur sama perasaanmu. Kabarin Ahmad ya biar dia bisa nemenin kamu! 🥀✨";
            else finalResponse = "Semoga setelah cerita ini bingungnya berkurang ya. Pelan-pelan aja, badainya pasti berlalu kok Meyyy! 🌈";

            addBubble(finalResponse, "bg-orange-100 text-orange-800 border border-orange-200");

            setTimeout(() => {
                const actionArea = document.createElement('div');
                actionArea.className = "space-y-2 mt-4 fade-in pb-4";
                actionArea.innerHTML = `
                    <button onclick="sendToWhatsApp()" class="w-full p-4 bg-green-500 text-white rounded-xl text-xs font-bold shadow-md active:bg-green-600 transition-all">📲 Kirim ke WA Ahmad</button>
                    <button onclick="downloadImage()" class="w-full p-4 bg-orange-400 text-white rounded-xl text-xs font-bold shadow-md active:bg-orange-500 transition-all">📸 Simpan Kartu Cerita</button>
                `;
                container.appendChild(actionArea);
                container.scrollTop = container.scrollHeight;
            }, 800);
        }

        inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
